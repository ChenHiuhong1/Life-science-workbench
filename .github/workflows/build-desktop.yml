name: Build Windows Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $confPath = "src-tauri\tauri.conf.json"
          $conf = Get-Content -Raw -LiteralPath $confPath | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 32 | Set-Content -LiteralPath $confPath -Encoding UTF8

          $cargoPath = "src-tauri\Cargo.toml"
          $cargo = Get-Content -Raw -LiteralPath $cargoPath
          $cargo = $cargo -replace '(?m)^version = ".+"', "version = `"$version`""
          Set-Content -LiteralPath $cargoPath -Value $cargo -Encoding UTF8

      - name: Build Windows installers
        shell: cmd
        run: build_windows.bat

      - name: Collect installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $files = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -Include *.msi,*.exe
          if (-not $files) {
            throw "No Windows installers were produced."
          }
          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination "release-assets\$($file.Name)" -Force
          }
          Get-ChildItem release-assets

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScienceWorkbench-Windows
          path: release-assets/*

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assets = Get-ChildItem -Path release-assets -File | ForEach-Object { $_.FullName }
          if (-not $assets) {
            throw "No release assets found."
          }

          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assets --clobber
          } else {
            $notes = @"
          Windows desktop installers for Science Workbench.

          Download from Assets:

          - Recommended: the `.exe` installer.
          - Alternative: the `.msi` installer.

          End users do not need Python, Node.js, Rust, or a browser preview server. Install the app and open Science Workbench from the Start menu or desktop shortcut.
          "@
            gh release create $env:TAG_NAME $assets `
              --title "Science Workbench $env:TAG_NAME" `
              --notes $notes
          }
